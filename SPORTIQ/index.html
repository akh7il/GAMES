<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTIQ</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="./responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Frijole&display&family=Bangers&display&family=Rum+Raisin&display&family=Denk+One&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="card">
        <div class="card_head">sportiq</div>
        <div class="display_questions">
            <p id="show_questions">loading . . . .</p>
        </div>
        <div class="score">
            <div class="current_score">
                <p>current score</p>
                <p id="current_score">0</p>
            </div>
            <div class="high_score">
                <p>high score</p>
                <p id="high_score">0</p>
            </div>
        </div>
        <div class="display_options">
            <button class="options">-</button>
            <button class="options">-</button>
            <button class="options">-</button>
            <button class="options">-</button>
        </div>
        <div class="card_footer">
            <button type="reset" class="reset" id="reset">loading. . . .</button>
        </div>
    </div>
    <script src="./index.js"></script>
</body>

</html>
